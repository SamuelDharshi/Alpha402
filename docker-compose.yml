version: '3.8'

services:
  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
    env_file: .env
    ports:
      - "3001:3001"
    restart: always

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    depends_on:
      - agents
    restart: always
