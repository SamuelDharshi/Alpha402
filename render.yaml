services:
  - type: web
    name: alpha402-agents
    runtime: node
    buildCommand: npm install && npm run build --workspace=agents
    startCommand: npm start --workspace=agents
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ZERO_G_PRIVATE_KEY
        sync: false
      - key: ZG_API_SECRET
        sync: false
      - key: ZG_PROVIDER_ADDRESS
        sync: false
      - key: ZG_SERVICE_URL
        sync: false
      - key: ZG_RPC_URL
        value: https://evmrpc-testnet.0g.ai
      - key: ZG_MODEL
        value: qwen/qwen-2.5-7b-instruct
      - key: NODE_VERSION
        value: "20.12.2"
    plan: free
      - key: GROQ_API_KEY
        sync: false
      - key: STRATEGY_VAULT_ADDRESS
        sync: false
      - key: KEEPERHUB_PRIVATE_KEY
        sync: false
      - key: MOCK_MODE
        value: "false"

  - type: web
    name: alpha402-frontend
    runtime: node
    plan: free
    buildCommand: cd alpha402 && npm install --legacy-peer-deps && npm run build
    startCommand: cd alpha402 && npm start
    envVars:
      - key: NEXT_PUBLIC_AGENT_WS_URL
        value: wss://alpha402-agents.onrender.com
      - key: NODE_VERSION
        value: "20.12.2"
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"

