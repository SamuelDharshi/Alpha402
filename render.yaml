services:
  - type: web
    name: alpha402-agents
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=shared && npm run build --workspace=agents
    startCommand: npm run start --workspace=agents
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: ZERO_G_PRIVATE_KEY
        sync: false
      - key: ZG_API_SECRET
        sync: false
      - key: ZG_PROVIDER_ADDRESS
        sync: false
      - key: ZG_SERVICE_URL
        sync: false
      - key: ZG_RPC_URL
        value: https://evmrpc-testnet.0g.ai
      - key: ZG_MODEL
        value: qwen/qwen-2.5-7b-instruct
      - key: GROQ_API_KEY
        sync: false
      - key: STRATEGY_VAULT_ADDRESS
        sync: false
      - key: KEEPERHUB_PRIVATE_KEY
        sync: false
      - key: AGENT_REGISTRY_ADDRESS
        sync: false
      - key: MOCK_MODE
        value: "false"

  - type: worker
    name: alpha402-bot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=shared && npm run build --workspace=bot
    startCommand: npm run start --workspace=bot
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AGENT_WS_URL
        value: wss://alpha402-agents.onrender.com
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: STRATEGY_VAULT_ADDRESS
        sync: false
      - key: AGENT_REGISTRY_ADDRESS
        sync: false
      - key: NODE_VERSION
        value: "20.12.2"

