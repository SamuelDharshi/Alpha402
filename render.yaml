services:
  - type: web
    name: alpha402-agents
    runtime: node
    buildCommand: echo "build skipped"
    startCommand: bash start-agents.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ZERO_G_PRIVATE_KEY
        sync: false
      - key: ZG_API_SECRET
        sync: false
      - key: ZG_PROVIDER_ADDRESS
        sync: false
      - key: ZG_SERVICE_URL
        sync: false
      - key: ZG_RPC_URL
        value: https://evmrpc-testnet.0g.ai
      - key: ZG_MODEL
        value: qwen/qwen-2.5-7b-instruct
      - key: GROQ_API_KEY
        sync: false
      - key: STRATEGY_VAULT_ADDRESS
        sync: false
      - key: KEEPERHUB_PRIVATE_KEY
        sync: false
      - key: MOCK_MODE
        value: "false"
